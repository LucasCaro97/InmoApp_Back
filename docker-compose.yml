services:

  mysql:
    image: mysql:8.0
    container_name: inmogestion-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inmogestion
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - aserraquo-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inmogestion-api
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://inmogestion-mysql:3306/inmogestion
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      APP_ADMIN_USER: admin@gmail.com
      APP_ADMIN_PASS: secreto123
      RUTA_IMAGENES: /opt
    ports:
      - "8085:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aserraquo-network

volumes:
  mysql_data:

networks:
  aserraquo-network:
    external: true

